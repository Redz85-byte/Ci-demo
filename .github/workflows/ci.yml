name: Node CI-workflow

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

jobs:
  CI-workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6  
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Audit
        run: npm audit audit --audit-level=high
      - name: Linting
        run: npm run lint
      - name: Run tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Deploy
        if: github.event_name == 'release'
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        

  Deploy:
    runs-on: ubuntu-latest
    needs: CI-workflow
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      