name: Node CI-workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  CI-workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6  
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Audit
        run: npm audit audit --audit-level=high
      - name: Linting
        run: npm run lint
      - name: Run tests
        run: npm run test
      - name: Build
        run: npm run build
      